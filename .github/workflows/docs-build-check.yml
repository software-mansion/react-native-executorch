name: Check documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs-build-check.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs-build-check.yml'
  workflow_dispatch:
jobs:
  check:
    if: github.repository == 'software-mansion/react-native-executorch'
    runs-on: ubuntu-latest
    concurrency:
      group: docs-check-${{ github.ref }}
      cancel-in-progress: true
    env:
      WORKING_DIRECTORY: docs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install node dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: yarn install --immutable
      - name: Check TypeDoc is up-to-date
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          yarn docusaurus generate-typedoc
          npx prettier --write "./docs/**/*.{md,mdx}"
          if ! git diff --quiet; then
            echo "API docs are out of date. Please run 'yarn build' locally and commit the changes."
            echo ""
            echo "Changed files:"
            git diff --name-only
            exit 1
          fi
          echo "API docs are up to date."
      - name: Generate docs
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: yarn build
