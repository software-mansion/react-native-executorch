version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/packages/*"
      - "/apps/*"
      - "/docs"
    schedule:
      interval: "monthly"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      all-updates:
        applies-to: version-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
