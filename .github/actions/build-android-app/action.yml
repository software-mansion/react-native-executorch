name: Build Android app
description: Build an Android demo app from this monorepo (with optional Expo prebuild)

inputs:
  app-path:
    description: Path to the app workspace, relative to the repo root (e.g. apps/llm)
    required: true
  expo-prebuild:
    description: Whether to run `expo prebuild --platform android` before the Gradle build
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Free disk space
      shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker system prune -af

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: "yarn"

    - name: Setup Java 17
      uses: actions/setup-java@v5
      with:
        distribution: "zulu"
        java-version: 17
        cache: "gradle"

    - name: Install root dependencies
      shell: bash
      run: yarn install --immutable

    - name: Install Expo CLI
      if: inputs.expo-prebuild == 'true'
      shell: bash
      run: |
        npm install -g @expo/cli
        echo "$(npm prefix -g)/bin" >> $GITHUB_PATH

    - name: Generate native Android project
      if: inputs.expo-prebuild == 'true'
      working-directory: ${{ inputs.app-path }}
      shell: bash
      run: |
        rm -rf android
        npx expo prebuild --platform android --no-install

    - name: Cache Gradle
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ${{ inputs.app-path }}/android/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build app
      working-directory: ${{ inputs.app-path }}/android
      shell: bash
      run: |
        ./gradlew assembleDebug \
          --build-cache \
          --parallel \
          --daemon \
          --configure-on-demand \
          -PreactNativeArchitectures=arm64-v8a \
          -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError" \
          -Dorg.gradle.workers.max=4
