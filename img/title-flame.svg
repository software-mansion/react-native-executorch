<svg width="400" height="60" viewBox="0 0 400 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleFlame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3300;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9933;stop-opacity:1" />
    </linearGradient>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="10" y="40" font-family="Arial, sans-serif" font-size="32" font-weight="bold"
        fill="url(#titleFlame)" filter="url(#titleGlow)">
    React Native ExecuTorch 🔥
  </text>
</svg>
