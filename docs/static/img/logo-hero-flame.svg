<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3300;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Flame background -->
  <ellipse cx="150" cy="200" rx="100" ry="80" fill="url(#flameGrad)" opacity="0.3" filter="url(#glow)"/>

  <!-- Main flame shape -->
  <path d="M 150 50 Q 130 100 140 150 Q 145 120 150 100 Q 155 120 160 150 Q 170 100 150 50 Z"
        fill="url(#flameGrad)" filter="url(#glow)">
    <animate attributeName="d"
             dur="2s"
             repeatCount="indefinite"
             values="M 150 50 Q 130 100 140 150 Q 145 120 150 100 Q 155 120 160 150 Q 170 100 150 50 Z;
                     M 150 40 Q 125 95 138 155 Q 145 115 150 95 Q 155 115 162 155 Q 175 95 150 40 Z;
                     M 150 50 Q 130 100 140 150 Q 145 120 150 100 Q 155 120 160 150 Q 170 100 150 50 Z"/>
  </path>

  <!-- Text -->
  <text x="150" y="240" font-family="Arial, sans-serif" font-size="24" font-weight="bold"
        text-anchor="middle" fill="url(#flameGrad)" filter="url(#glow)">
    EXECUTORCH
  </text>

  <!-- Subtitle -->
  <text x="150" y="265" font-family="Arial, sans-serif" font-size="12"
        text-anchor="middle" fill="#ff6600">
    🔥 BLAZING FAST ON-DEVICE AI 🔥
  </text>
</svg>
